<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoShorts AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AutoShorts AI</h1>
        </header>

        <main>
            <!-- Upload Section -->
            <section id="upload-section" class="card">
                <div id="drop-zone" class="drop-zone">
                    <p>Drag & Drop MP4 Video</p>
                    <input type="file" id="file-input" accept="video/mp4" hidden>
                </div>
                <button id="browse-btn" class="secondary-btn">Browse Files</button>
                <p id="file-name" class="file-name"></p>
            </section>

            <!-- Settings Section -->
            <section id="config-section" class="card hidden">
                <div class="input-group">
                    <label for="num-shorts">Number of Shorts</label>
                    <select id="num-shorts">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="clip-duration">Clip Duration (seconds)</label>
                    <select id="clip-duration">
                        <option value="15">15s</option>
                        <option value="30" selected>30s</option>
                        <option value="45">45s</option>
                        <option value="60">60s</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="whisper-model">Whisper Model</label>
                    <select id="whisper-model">
                        <option value="tiny">Tiny</option>
                        <option value="base" selected>Base</option>
                        <option value="small">Small</option>
                    </select>
                </div>

                <button id="generate-btn" class="primary-btn">Generate Shorts</button>
            </section>

            <!-- Progress Section -->
            <section id="progress-section" class="card hidden">
                <p id="progress-stage">Initializing...</p>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </section>

            <!-- Transcript Section -->
            <section id="transcript-section" class="card hidden">
                <button id="toggle-transcript" class="collapsible-btn">Show Transcript</button>
                <div id="transcript-content" class="collapsible-content hidden">
                    <div class="transcript-box">
                        <p><strong>[00:00]</strong> This is a dummy transcript timestamp.</p>
                        <p><strong>[00:05]</strong> The backend will provide real text later.</p>
                        <p><strong>[00:10]</strong> This panel is collapsible for better UI flow.</p>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section id="results-section" class="card hidden">
                <h2>Shorts Generated</h2>
                <div id="results-grid" class="results-grid">
                    <!-- Result cards will be injected here -->
                </div>
                <button id="reset-btn" class="secondary-btn">Start Over</button>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
