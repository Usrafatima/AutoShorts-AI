<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoShorts AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AutoShorts AI</h1>
        </header>

        <main>
            <!-- 1. Upload Section -->
            <section id="upload-section">
                <div class="upload-card" id="drop-zone">
                    <input type="file" id="file-input" hidden accept="video/*">
                    <p id="upload-prompt">Select video to process</p>
                    <p id="selected-file-name" class="hidden" style="font-weight: 600; margin-bottom: 1rem;"></p>
                    <button id="browse-btn">Choose File</button>
                </div>
            </section>

            <!-- 2. Settings Section -->
            <section id="settings-section" class="hidden">
                <div class="section-box">
                    <h3>Settings</h3>
                    <div class="setting-item">
                        <label>Number of Shorts</label>
                        <select id="shorts-count">
                            <option value="1">1</option>
                            <option value="3" selected>3</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Clip Duration (sec)</label>
                        <select id="clip-duration">
                            <option value="15">15</option>
                            <option value="30" selected>30</option>
                            <option value="60">60</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Whisper Model</label>
                        <select id="whisper-model">
                            <option value="tiny">Tiny</option>
                            <option value="base" selected>Base</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- 3. Generate Section -->
            <section id="generate-section" class="hidden" style="text-align: center; margin-top: 2rem;">
                <button id="generate-btn" style="width: 100%; padding: 1rem;">Generate Shorts</button>
            </section>

            <!-- 4. Progress Section -->
            <section id="progress-section" class="hidden">
                <div class="section-box">
                    <p id="status-text">Ready...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </section>

            <!-- 5. Transcript Section -->
            <section id="transcript-section" class="hidden">
                <details>
                    <summary>View Transcript</summary>
                    <div class="transcript-content">
                        <p><span>[00:00]</span> Initializing local processing engine...</p>
                        <p><span>[00:04]</span> Extracting audio from uploaded source.</p>
                        <p><span>[00:08]</span> Running Whisper transcription (Base model).</p>
                    </div>
                </details>
            </section>

            <!-- 6. Results Section -->
            <section id="results-section" class="hidden">
                <div id="shorts-grid" class="shorts-grid"></div>
                <div style="margin-top: 2rem; border-top: 1px solid #eeeeee; padding-top: 1rem;">
                    <button id="new-job-btn">Start Over</button>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
